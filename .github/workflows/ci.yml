name: CI
on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 18 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 
        uses: actions/checkout@v6
      - name: Checkout GitHub App
        uses: actions/checkout@v6
        with:
          repository: manuzhang/github-app
          path: github-app
      - name: Set up Scala 
        uses: olafurpg/setup-scala@v10
      - name: Refresh data
        run:  cd github-app && sbt "runMain io.github.manuzhang.graphql.GetAwesomeStreamingRepos --auth-token ${{ secrets.GITHUB_TOKEN }}" && cp awesome-streaming-repos.json ../src/assets/repos.json && cd ..
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '12.x'
          cache: 'yarn'
          cache-dependency-path: yarn.lock
      - name: Backfill lastUpdate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/backfill-last-update.js src/assets/repos.json
      - run: yarn
      - run: yarn run build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          publish_dir: ./dist
          external_repository: manuzhang/awesome-streaming
